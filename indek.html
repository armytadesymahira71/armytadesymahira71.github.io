<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            padding: 40px 30px;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .bio {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
            font-weight: 300;
            line-height: 1.6;
        }

        /* Bagian Informasi Tambahan */
        .info-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #444;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-item i {
            width: 25px;
            color: #6c5ce7;
            margin-right: 10px;
            font-size: 16px;
        }

        /* Bagian Sosial Media */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: #f1f2f6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        /* Warna Hover masing-masing Sosmed */
        .social-icon.instagram:hover { background: #e1306c; color: #fff; }
        .social-icon.linkedin:hover { background: #0077b5; color: #fff; }
        .social-icon.github:hover { background: #333; color: #fff; }
        .social-icon.twitter:hover { background: #1da1f2; color: #fff; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400" alt="Foto Profil" class="avatar">
        
        <h1 class="name">Nama Lengkap Anda</h1>
        <p class="bio">Web Designer & Content Creator yang suka berbagi info seputar teknologi dan desain digital.</p>
        
        <div class="info-section">
            <div class="info-item">
                <i class="fa-solid fa-briefcase"></i>
                <span>Pekerjaan / Status Saat Ini</span>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Jakarta, Indonesia</span>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-envelope"></i>
                <span>emailanda@domain.com</span>
            </div>
        </div>

        <div class="social-links">
            <a href="https://instagram.com/username" target="_blank" class="social-icon instagram" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://linkedin.com/in/username" target="_blank" class="social-icon linkedin" title="LinkedIn">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a href="https://github.com/username" target="_blank" class="social-icon github" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://twitter.com/username" target="_blank" class="social-icon twitter" title="Twitter/X">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
        </div>
    </div>

</body>
</html>
